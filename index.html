<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Формы для работы с клиентами</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #f1f1f1;
            margin-right: 5px;
            border-radius: 5px 5px 0 0;
            transition: background-color 0.3s;
        }
        .tab:hover {
            background-color: #ddd;
        }
        .tab.active {
            background-color: #4CAF50;
            color: white;
        }
        .tab-content {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 0 0 5px 5px;
            background-color: #f9f9f9;
            width: 100%;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="tel"], select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            max-width: 300px;
        }
        .radio-group, .checkbox-group {
            margin-top: 5px;
        }
        .radio-group label, .checkbox-group label {
            display: inline-block;
            margin-right: 15px;
            font-weight: normal;
            cursor: pointer;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .conditional-field {
            display: none;
            margin-top: 10px;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" data-tab="tab1">Покупка/аренда конкретного ОН</div>
        <div class="tab" data-tab="tab2">Покупка/аренда. Подбор</div>
        <div class="tab" data-tab="tab3">Продать/сдать. Лид на офис</div>
        <div class="tab" data-tab="tab4">Веб заявка</div>
        <div class="tab" data-tab="tab5">Звонок по вакансии</div>
        <div class="tab" data-tab="tab6">Жалоба - снять ОН</div>
    </div>

    <!-- Покупка/аренда конкретного ОН -->
    <div id="tab1" class="tab-content active">
        <form id="form1">
            <div class="form-group">
                <label for="source1">Источник:</label>
                <input type="text" id="source1" name="source1" maxlength="30">
            </div>
            <div class="form-group">
                <label for="name1">Имя:</label>
                <input type="text" id="name1" name="name1" maxlength="20">
            </div>
            <div class="form-group">
                <label>Кто это:</label>
                <div class="radio-group">
                    <label><input type="radio" name="role1" value="agent"> Агент</label>
                    <label><input type="radio" name="role1" value="client"> Клиент</label>
                </div>
            </div>
            <div class="form-group">
                <label for="address1">Адрес подбора:</label>
                <input type="text" id="address1" name="address1" maxlength="100">
            </div>
            <div class="form-group">
                <label for="price1">Стоимость объекта:</label>
                <input type="text" id="price1" name="price1" maxlength="20">
            </div>
            <div class="form-group">
                <label for="agent-name1">Имя агента в ОН:</label>
                <input type="text" id="agent-name1" name="agent-name1" maxlength="20">
            </div>
            <button type="button" onclick="copyFormData('form1')">Копировать</button>
        </form>
    </div>

    <!-- Покупка/аренда. Подбор -->
    <div id="tab2" class="tab-content">
        <form id="form2">
            <div class="form-group">
                <label for="source2">Источник:</label>
                <select id="source2" name="source2" onchange="showConditionalFields2()">
                    <option value="">Выберите источник</option>
                    <option value="banner">Баннер</option>
                    <option value="penza-banner">Пенза баннер</option>
                    <option value="city-street">Город+Улица</option>
                    <option value="maps-call">Звонок с карт</option>
                    <option value="other-sources">Др.источники</option>
                </select>
            </div>
            
            <div id="city-street-field" class="conditional-field">
                <label for="city-street-detail">Город+Улица:</label>
                <input type="text" id="city-street-detail" name="city-street-detail" maxlength="30">
            </div>
            
            <div id="penza-banner-field" class="conditional-field">
                <label for="banner-address">Адрес баннера:</label>
                <input type="text" id="banner-address" name="banner-address" maxlength="50">
            </div>
            
            <div id="maps-call-fields" class="conditional-field">
                <label for="maps-city">Город:</label>
                <input type="text" id="maps-city" name="maps-city" maxlength="30">
                
                <label for="office-address">Адрес офиса:</label>
                <input type="text" id="office-address" name="office-address" maxlength="30">
            </div>
            
            <div id="other-sources-fields" class="conditional-field">
                <label for="other-city">Город:</label>
                <input type="text" id="other-city" name="other-city" maxlength="30">
                
                <label for="other-office-address">Адрес офиса:</label>
                <input type="text" id="other-office-address" name="other-office-address" maxlength="30">
                
                <label for="nearby">Рядом:</label>
                <input type="text" id="nearby" name="nearby" maxlength="50">
            </div>
            
            <div class="form-group">
                <label for="name2">Имя:</label>
                <input type="text" id="name2" name="name2" maxlength="20">
            </div>
            
            <div class="form-group">
                <label>Кто это:</label>
                <div class="radio-group">
                    <label><input type="radio" name="role2" value="agent"> Агент</label>
                    <label><input type="radio" name="role2" value="client"> Клиент</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Покупка/аренда:</label>
                <div class="radio-group">
                    <label><input type="radio" name="deal-type2" value="purchase"> Покупка</label>
                    <label><input type="radio" name="deal-type2" value="rent"> Аренда</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="district">Район подбора:</label>
                <input type="text" id="district" name="district" maxlength="30">
            </div>
            
            <div class="form-group">
                <label>Тип:</label>
                <div class="radio-group">
                    <label><input type="radio" name="property-type2" value="primary"> Первичка</label>
                    <label><input type="radio" name="property-type2" value="secondary"> Вторичка</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="rooms">Кол.комнат:</label>
                <input type="text" id="rooms" name="rooms" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="area">Площадь:</label>
                <input type="text" id="area" name="area" maxlength="20">
            </div>
            
            <div class="form-group">
                <label for="floor">Этаж:</label>
                <input type="text" id="floor" name="floor" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="budget">Бюджет:</label>
                <input type="text" id="budget" name="budget" maxlength="30">
            </div>
            
            <div id="budget-composition" class="form-group" style="display: none;">
                <label>Из чего состоит бюджет:</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="budget-composition" value="own-funds"> Собственные средства</label>
                    <label><input type="checkbox" name="budget-composition" value="mortgage"> Ипотека</label>
                    <label><input type="checkbox" name="budget-composition" value="maternity-capital"> Материнский капитал</label>
                    <label><input type="checkbox" name="budget-composition" value="credit"> Кредит</label>
                </div>
            </div>
            
            <button type="button" onclick="copyFormData('form2')">Копировать</button>
        </form>
    </div>

    <!-- Продать/сдать. Лид на офис -->
    <div id="tab3" class="tab-content">
        <form id="form3">
            <div class="form-group">
                <label for="source3">Источник:</label>
                <select id="source3" name="source3" onchange="showConditionalFields3()">
                    <option value="">Выберите источник</option>
                    <option value="banner">Баннер</option>
                    <option value="penza-banner">Пенза баннер</option>
                    <option value="city-street">Город+Улица</option>
                    <option value="maps-call">Звонок с карт</option>
                    <option value="other-sources">Др.источники</option>
                </select>
            </div>
            
            <div id="city-street-field3" class="conditional-field">
                <label for="city-street-detail3">Город+Улица:</label>
                <input type="text" id="city-street-detail3" name="city-street-detail3" maxlength="30">
            </div>
            
            <div id="penza-banner-field3" class="conditional-field">
                <label for="banner-address3">Адрес баннера:</label>
                <input type="text" id="banner-address3" name="banner-address3" maxlength="50">
            </div>
            
            <div id="maps-call-fields3" class="conditional-field">
                <label for="maps-city3">Город:</label>
                <input type="text" id="maps-city3" name="maps-city3" maxlength="30">
                
                <label for="office-address3">Адрес офиса:</label>
                <input type="text" id="office-address3" name="office-address3" maxlength="30">
            </div>
            
            <div id="other-sources-fields3" class="conditional-field">
                <label for="other-city3">Город:</label>
                <input type="text" id="other-city3" name="other-city3" maxlength="30">
                
                <label for="other-office-address3">Адрес офиса:</label>
                <input type="text" id="other-office-address3" name="other-office-address3" maxlength="30">
                
                <label for="nearby3">Рядом:</label>
                <input type="text" id="nearby3" name="nearby3" maxlength="50">
            </div>
            
            <div class="form-group">
                <label for="name3">Имя:</label>
                <input type="text" id="name3" name="name3" maxlength="20">
            </div>
            
            <div class="form-group">
                <label>Кто это:</label>
                <div class="radio-group">
                    <label><input type="radio" name="role3" value="agent"> Агент</label>
                    <label><input type="radio" name="role3" value="client"> Клиент</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Продажа/Сдача:</label>
                <div class="radio-group">
                    <label><input type="radio" name="deal-type3" value="sale"> Продажа</label>
                    <label><input type="radio" name="deal-type3" value="rent"> Сдача</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="object-address">Адрес объекта:</label>
                <input type="text" id="object-address" name="object-address" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="rooms3">Кол.комнат:</label>
                <input type="text" id="rooms3" name="rooms3" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="area3">Площадь:</label>
                <input type="text" id="area3" name="area3" maxlength="20">
            </div>
            
            <div class="form-group">
                <label for="floor3">Этаж:</label>
                <input type="text" id="floor3" name="floor3" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="price3">Продает за:</label>
                <input type="text" id="price3" name="price3" maxlength="40">
            </div>
            
            <button type="button" onclick="copyFormData('form3')">Копировать</button>
        </form>
    </div>

    <!-- Веб заявка -->
    <div id="tab4" class="tab-content">
        <form id="form4">
            <div class="form-group">
                <label for="name4">Имя:</label>
                <input type="text" id="name4" name="name4" maxlength="20">
            </div>
            
            <div class="form-group">
                <label>Кто это:</label>
                <div class="radio-group">
                    <label><input type="radio" name="role4" value="agent"> Агент</label>
                    <label><input type="radio" name="role4" value="client"> Клиент</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="mortgage-type">Тип ипотеки:</label>
                <input type="text" id="mortgage-type" name="mortgage-type" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="city4">Город:</label>
                <input type="text" id="city4" name="city4" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="street-metro">Улица/Метро:</label>
                <input type="text" id="street-metro" name="street-metro" maxlength="30">
            </div>
            
            <button type="button" onclick="copyFormData('form4')">Копировать</button>
        </form>
    </div>

    <!-- Звонок по вакансии -->
    <div id="tab5" class="tab-content">
        <form id="form5">
            <div class="form-group">
                <label for="name5">Имя:</label>
                <input type="text" id="name5" name="name5" maxlength="20">
            </div>
            
            <button type="button" onclick="copyFormData('form5')">Копировать</button>
        </form>
    </div>

    <!-- Жалоба - снять ОН -->
    <div id="tab6" class="tab-content">
        <form id="form6">
            <div class="form-group">
                <label for="name6">Имя:</label>
                <input type="text" id="name6" name="name6" maxlength="20">
            </div>
            
            <div class="form-group">
                <label for="phone6">Телефон:</label>
                <input type="tel" id="phone6" name="phone6" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="agent-name6">ФИО Агента:</label>
                <input type="text" id="agent-name6" name="agent-name6" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="agent-office6">Офис агента:</label>
                <input type="text" id="agent-office6" name="agent-office6" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="address6">Адрес:</label>
                <input type="text" id="address6" name="address6" maxlength="30">
            </div>
            
            <button type="button" onclick="copyComplaintData()">Копировать</button>
        </form>
    </div>

    <script>
        // Переключение вкладок
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                // Удаляем активный класс у всех вкладок и контента
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                // Добавляем активный класс к выбранной вкладке и соответствующему контенту
                tab.classList.add('active');
                const tabId = tab.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Показать/скрыть условные поля для формы 2 (Покупка/аренда. Подбор)
        function showConditionalFields2() {
            const source = document.getElementById('source2').value;
            
            // Скрываем все условные поля
            document.querySelectorAll('#tab2 .conditional-field').forEach(field => {
                field.style.display = 'none';
            });
            
            // Показываем нужные поля в зависимости от выбранного источника
            if (source === 'city-street') {
                document.getElementById('city-street-field').style.display = 'block';
            } else if (source === 'penza-banner') {
                document.getElementById('penza-banner-field').style.display = 'block';
            } else if (source === 'maps-call') {
                document.getElementById('maps-call-fields').style.display = 'block';
            } else if (source === 'other-sources') {
                document.getElementById('other-sources-fields').style.display = 'block';
            }
            
            // Показываем/скрываем состав бюджета в зависимости от типа сделки
            const dealType = document.querySelector('input[name="deal-type2"]:checked');
            if (dealType && dealType.value === 'purchase') {
                document.getElementById('budget-composition').style.display = 'block';
            } else {
                document.getElementById('budget-composition').style.display = 'none';
            }
        }
        
        // Показать/скрыть условные поля для формы 3 (Продать/сдать. Лид на офис)
        function showConditionalFields3() {
            const source = document.getElementById('source3').value;
            
            // Скрываем все условные поля
            document.querySelectorAll('#tab3 .conditional-field').forEach(field => {
                field.style.display = 'none';
            });
            
            // Показываем нужные поля в зависимости от выбранного источника
            if (source === 'city-street') {
                document.getElementById('city-street-field3').style.display = 'block';
            } else if (source === 'penza-banner') {
                document.getElementById('penza-banner-field3').style.display = 'block';
            } else if (source === 'maps-call') {
                document.getElementById('maps-call-fields3').style.display = 'block';
            } else if (source === 'other-sources') {
                document.getElementById('other-sources-fields3').style.display = 'block';
            }
        }
        
        // Слушаем изменения радиокнопок "Покупка/аренда" в форме 2
        document.querySelectorAll('input[name="deal-type2"]').forEach(radio => {
            radio.addEventListener('change', showConditionalFields2);
        });

        // Копирование данных из формы (кроме формы жалобы)
        function copyFormData(formId) {
            const form = document.getElementById(formId);
            const formData = new FormData(form);
            let result = '';
            
            for (const [name, value] of formData.entries()) {
                if (value && value.trim() !== '') {
                    // Для чекбоксов собираем все отмеченные значения
                    if (form.elements[name].type === 'checkbox') {
                        const checkboxes = form.querySelectorAll(`input[name="${name}"]:checked`);
                        if (checkboxes.length > 0) {
                            const values = Array.from(checkboxes).map(cb => cb.value).join(', ');
                            result += `${getFieldLabel(formId, name)}: ${values}\n`;
                        }
                    } 
                    // Для радиокнопок и других полей
                    else {
                        result += `${getFieldLabel(formId, name)}: ${value}\n`;
                    }
                }
            }
            
            if (result) {
                navigator.clipboard.writeText(result.trim())
                    .then(() => alert('Данные скопированы в буфер обмена!'))
                    .catch(err => console.error('Ошибка копирования: ', err));
            } else {
                alert('Нет данных для копирования!');
            }
        }
        
        // Копирование данных жалобы по специальному шаблону
        function copyComplaintData() {
            const name = document.getElementById('name6').value || 'не указано';
            const phone = document.getElementById('phone6').value || 'не указано';
            const agentName = document.getElementById('agent-name6').value || 'не указано';
            const agentOffice = document.getElementById('agent-office6').value || 'не указано';
            const address = document.getElementById('address6').value || 'не указано';
            
            const complaintText = `Имя клиента: ${name}
Телефон клиента: ${phone}
ФИО агента: ${agentName}
Офис агента: ${agentOffice}
Суть жалобы: Клиент просит снять ОН по адресу ${address} с продажи со всех площадок, т.к не давал своего согласия`;
            
            navigator.clipboard.writeText(complaintText)
                .then(() => alert('Текст жалобы скопирован в буфер обмена!'))
                .catch(err => console.error('Ошибка копирования: ', err));
        }
        
        // Получение читаемого названия поля для вывода
        function getFieldLabel(formId, fieldName) {
            const form = document.getElementById(formId);
            const label = form.querySelector(`label[for="${fieldName}"]`);
            return label ? label.textContent.replace(':', '') : fieldName;
        }
    </script>
</body>
</html>
